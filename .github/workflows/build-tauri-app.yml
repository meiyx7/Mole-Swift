name: Build Tauri App

on:
  push:
    branches: [main, feat/tauri-gui]
    tags: ["tauri-v*"]
    paths:
      - "MoleTauri/**"
      - ".github/workflows/build-tauri-app.yml"
  pull_request:
    paths:
      - "MoleTauri/**"
      - ".github/workflows/build-tauri-app.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Mole Tauri
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: MoleTauri/src-tauri

      - name: Install dependencies
        working-directory: MoleTauri
        run: npm install

      - name: Build Tauri app
        working-directory: MoleTauri
        run: npx tauri build

      - name: Ad-hoc sign app
        working-directory: MoleTauri/src-tauri/target/release/bundle/macos
        run: |
          codesign --force --deep --options runtime -s - Mole.app
          codesign --verify --verbose=2 Mole.app

      - name: Package .app into zip
        working-directory: MoleTauri/src-tauri/target/release/bundle/macos
        run: |
          ditto -c -k --keepParent Mole.app Mole-Tauri-macOS.zip
          shasum -a 256 Mole-Tauri-macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mole-Tauri-macOS
          path: MoleTauri/src-tauri/target/release/bundle/macos/Mole-Tauri-macOS.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/tauri-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Mole-Tauri-macOS
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Mole Tauri ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/Mole-Tauri-macOS.zip
