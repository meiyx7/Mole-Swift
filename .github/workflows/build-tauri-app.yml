name: Build Tauri App

on:
  push:
    branches: [main]
    paths: ['MoleTauri/**']
  pull_request:
    paths: ['MoleTauri/**']
  workflow_dispatch:

jobs:
  build:
    name: Build Mole Tauri
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: MoleTauri/src-tauri

      - name: Install dependencies
        working-directory: MoleTauri
        run: npm install

      - name: Build Tauri app
        working-directory: MoleTauri
        run: npx tauri build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mole-Tauri-macOS
          path: MoleTauri/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 30
