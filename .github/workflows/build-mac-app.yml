name: Build macOS App

on:
  push:
    branches: [main, master, "trae/**"]
    tags: ["v*"]
    paths:
      - "MoleApp/**"
      - ".github/workflows/build-mac-app.yml"
  pull_request:
    paths:
      - "MoleApp/**"
      - ".github/workflows/build-mac-app.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build Mole.app
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: MoleApp
        run: xcodegen generate

      - name: Build app (Release, universal)
        working-directory: MoleApp
        run: |
          set -euo pipefail
          xcodebuild \
            -project MoleApp.xcodeproj \
            -scheme MoleApp \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_STYLE=Manual \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Locate built .app
        id: app
        working-directory: MoleApp
        run: |
          APP_PATH="$(find build/Build/Products/Release -maxdepth 1 -name 'MoleApp.app' | head -n 1)"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"

      - name: Verify app icon compiled into bundle
        working-directory: MoleApp
        run: |
          APP_PATH="${{ steps.app.outputs.app_path }}"
          echo "Checking for AppIcon.icns in bundle..."
          if [[ -f "$APP_PATH/Contents/Resources/AppIcon.icns" ]]; then
            echo "OK: AppIcon.icns found ($(stat -f%z "$APP_PATH/Contents/Resources/AppIcon.icns") bytes)"
          else
            echo "ERROR: AppIcon.icns missing from bundle!"
            echo "Contents of Resources:"
            ls -la "$APP_PATH/Contents/Resources/"
            exit 1
          fi
          # Also verify Info.plist references the icon
          /usr/libexec/PlistBuddy -c "Print :CFBundleIconName" "$APP_PATH/Contents/Info.plist" || true

      - name: Ad-hoc sign & verify
        working-directory: MoleApp
        run: |
          APP_PATH="${{ steps.app.outputs.app_path }}"
          codesign --force --deep --options runtime --entitlements Resources/MoleApp.entitlements -s - "$APP_PATH"
          codesign --verify --verbose=2 "$APP_PATH"

      - name: Package .app into zip
        working-directory: MoleApp/build/Build/Products/Release
        run: |
          ditto -c -k --keepParent MoleApp.app Mole-macOS-universal.zip
          shasum -a 256 Mole-macOS-universal.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mole-macOS-universal
          path: MoleApp/build/Build/Products/Release/Mole-macOS-universal.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Mole-macOS-universal
          path: release

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Mole ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/Mole-macOS-universal.zip
